<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h3>Withdraw Money</h3>
        </div>

        <div class="card-body">

            <div class="mb-3">

                <label>Account Number</label>

                <input type="text" class="form-control" [(ngModel)]="accountNumber">

            </div>

            <div class="mb-3">

                <label>Amount</label>

                <input type="number" class="form-control" [(ngModel)]="amount">

            </div>

            <button class="btn btn-danger" (click)="withdraw()">

                Withdraw

            </button>

        </div>

    </div>

</div>
