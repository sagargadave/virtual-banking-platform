<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">

            <h3>Edit Profile</h3>

        </div>

        <div class="card-body">

            <div class="mb-3">

                <label>First Name</label>

                <input
                    type="text"
                    class="form-control"
                    [(ngModel)]="firstName">

            </div>

            <div class="mb-3">

                <label>Last Name</label>

                <input
                    type="text"
                    class="form-control"
                    [(ngModel)]="lastName">

            </div>

            <div class="mb-3">

                <label>Phone</label>

                <input
                    type="text"
                    class="form-control"
                    [(ngModel)]="phone">

            </div>

            <div class="mb-3">

                <label>Address</label>

                <textarea
                    class="form-control"
                    [(ngModel)]="address">

                </textarea>

            </div>

            <button
                class="btn btn-success"
                (click)="updateProfile()">

                Save Changes

            </button>

        </div>

    </div>

</div>
