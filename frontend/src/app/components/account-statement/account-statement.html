<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">

            <h3>Account Statement</h3>

        </div>

        <div class="card-body">

            <div class="mb-3">

                <label>From Date</label>

                <input
                    type="date"
                    class="form-control"
                    [(ngModel)]="fromDate">

            </div>

            <div class="mb-3">

                <label>To Date</label>

                <input
                    type="date"
                    class="form-control"
                    [(ngModel)]="toDate">

            </div>

            <button
                class="btn btn-primary"
                (click)="downloadStatement()">

                Download PDF Statement

            </button>

        </div>

    </div>

</div>
